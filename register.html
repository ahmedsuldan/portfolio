<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is Diiwaan Geli — Ahmed Hassan Idiris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="page-loader"><div class="loader-mono">preparing_form<span class="blink">_</span></div></div>
<div class="auth-bg-glow"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="index.html">ahmed<span class="dot">.</span>dev</a></div>
    <h2>Akoon Samee</h2>
    <p class="sub">Diiwaan gali si aad fariin uga dirto ama xog u kaydiso.</p>

    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="reg-name">Magaca Buuxa</label>
        <input type="text" id="reg-name" class="form-control" placeholder="Magacaaga oo buuxa" autocomplete="name">
        <span class="field-error">Fadlan geli magacaaga.</span>
      </div>
      <div class="form-group">
        <label for="reg-email">Email</label>
        <input type="email" id="reg-email" class="form-control" placeholder="email@tusaale.com" autocomplete="email">
        <span class="field-error">Email-ka ma saxna.</span>
      </div>
      <div class="form-group">
        <label for="reg-password">Password</label>
        <div style="position:relative;">
          <input type="password" id="reg-password" class="form-control" placeholder="Ugu yaraan 8 xaraf" autocomplete="new-password">
          <span class="toggle-password" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">👁️</span>
        </div>
        <div class="password-strength"><div class="password-strength-fill"></div></div>
        <span class="field-error">Password-ku waa inuu noqdaa ugu yaraan 8 xaraf.</span>
      </div>
      <div class="form-group">
        <label for="reg-confirm">Xaqiiji Password-ka</label>
        <input type="password" id="reg-confirm" class="form-control" placeholder="••••••••" autocomplete="new-password">
        <span class="field-error">Password-yadu isma waafaqsana.</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <span class="loader"></span><span class="btn-text"><i class="fa-solid fa-user-plus"></i> Is Diiwaan Geli</span>
      </button>
    </form>

    <p class="auth-switch">Akoon hore ma u lihid? <a href="login.html">Soo gal</a></p>
    <p class="auth-switch"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Dib ugu noqo bogga hore</a></p>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
window.addEventListener('load', () => {
  const loader = document.getElementById('page-loader');
  if (loader) setTimeout(() => loader.classList.add('hidden'), 350);
});
</script>
</body>
</html>
