<!DOCTYPE html>
<html lang="so">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Ahmed Hassan Idiris</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="page-loader"><div class="loader-mono">connecting<span class="blink">_</span></div></div>
<div class="auth-bg-glow"></div>

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><a href="index.html">ahmed<span class="dot">.</span>dev</a></div>
    <h2>Soo Gal</h2>
    <p class="sub">Ku soo dhowow dib — geli xogtaada si aad u gasho.</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input type="email" id="login-email" class="form-control" placeholder="email@tusaale.com" autocomplete="email">
        <span class="field-error">Email-ka ma saxna.</span>
      </div>
      <div class="form-group">
        <label for="login-password">Password</label>
        <div style="position:relative;">
          <input type="password" id="login-password" class="form-control" placeholder="••••••••" autocomplete="current-password">
          <span class="toggle-password" style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer;">👁️</span>
        </div>
        <span class="field-error">Fadlan geli password-kaaga.</span>
      </div>
      <button type="submit" class="btn btn-primary btn-block">
        <span class="loader"></span><span class="btn-text"><i class="fa-solid fa-right-to-bracket"></i> Soo Gal</span>
      </button>
    </form>

    <p class="auth-switch">Akoon ma lihid? <a href="register.html">Is diiwaan geli</a></p>
    <p class="auth-switch"><a href="index.html"><i class="fa-solid fa-arrow-left"></i> Dib ugu noqo bogga hore</a></p>
  </div>
</div>

<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script>
window.addEventListener('load', () => {
  const loader = document.getElementById('page-loader');
  if (loader) setTimeout(() => loader.classList.add('hidden'), 350);
});
</script>
</body>
</html>
